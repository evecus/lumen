name: 构建 Windows 安装包

on:
  workflow_dispatch:
    inputs:
      tag:
        description: '发布版本号（格式如 v0.1.0，必须以 v 开头）'
        required: true
        type: string

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 校验手动输入的 tag 格式，避免后续步骤因为格式不对产生难以排查的问题。
      # 只在手动触发（workflow_dispatch）时执行。
      - name: 校验 tag 格式
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          TAG="${{ inputs.tag }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::tag 格式不对，必须形如 v0.1.0（v + 三段式版本号），当前输入是: $TAG"
            exit 1
          fi
          echo "TAG 校验通过: $TAG"

      # 把手动输入的 tag（如 v0.1.0）去掉开头的 v，得到纯版本号（0.1.0），
      # 写入后续步骤共享的环境变量，供下面注入版本号文件和发布 Release 使用。
      - name: 解析版本号
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          TAG="${{ inputs.tag }}"
          VERSION="${TAG#v}"
          echo "RELEASE_TAG=$TAG" >> "$GITHUB_ENV"
          echo "RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "解析结果 -> tag: $TAG, version: $VERSION"

      # 把解析出的纯版本号同时写入两个地方：
      #   1. src-tauri/Cargo.toml 的 [package] version 字段（Rust crate 自身的版本号）
      #   2. src-tauri/tauri.conf.json 的顶层 version 字段（这个才是 Tauri 打包时
      #      真正用来生成安装包文件属性版本号的来源）
      # 两处都要改，否则会出现"tag 是 v0.1.0，但安装包属性里的版本号还是旧值"的不一致。
      - name: 注入版本号
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          # Cargo.toml：只替换 [package] 段里独立成行的 version = "..."，
          # 避免误伤 [dependencies] 里形如 `tauri = { version = "2", ... }` 的依赖版本声明
          # （那些一定缩进在 { } 里，不会是"行首紧跟 version ="的独立整行）。
          perl -0pi -e 's/^version = "[^"]*"/version = "'"${RELEASE_VERSION}"'"/m' src-tauri/Cargo.toml

          # tauri.conf.json：用 Node 解析成对象再改写，比文本替换更安全，
          # 不会因为 JSON 里恰好出现同名字段或转义字符而改错地方。
          node -e "
            const fs = require('fs');
            const path = 'src-tauri/tauri.conf.json';
            const conf = JSON.parse(fs.readFileSync(path, 'utf-8'));
            conf.version = process.env.RELEASE_VERSION;
            fs.writeFileSync(path, JSON.stringify(conf, null, 2) + '\n');
          "

          echo "--- 修改后的 src-tauri/Cargo.toml 开头 ---"
          head -n 10 src-tauri/Cargo.toml
          echo "--- 修改后的 src-tauri/tauri.conf.json 开头 ---"
          head -n 6 src-tauri/tauri.conf.json

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 Rust 依赖
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: 安装前端依赖
        run: npm install

      - name: 构建前端
        run: npm run build

      # 手动触发（填了 tag）时：创建/更新对应的 git tag 并发布一个 Release 草稿，附上安装包；
      # 普通推送到 main 分支时：只构建、不创建 Release，产物走下面的 upload-artifact。
      - name: 构建 Tauri 应用（NSIS 安装包）
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event_name == 'workflow_dispatch' && env.RELEASE_TAG || '' }}
          releaseName: ${{ github.event_name == 'workflow_dispatch' && format('Lumen {0}', env.RELEASE_TAG) || '' }}
          prerelease: false
          includeUpdaterJson: false
