name: 构建 Windows 安装包

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 Rust 依赖
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: 安装前端依赖
        run: npm install

      - name: 构建前端
        run: npm run build

      # 推送 tag（如 v0.1.0）时会自动创建一个 GitHub Release 草稿并附上安装包；
      # 普通推送到 main 或手动触发时，只构建、不创建 Release，产物走下面的 upload-artifact。
      - name: 构建 Tauri 应用（NSIS 安装包）
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: "Lumen ${{ github.ref_name }}"
          releaseBody: "自动构建的 Lumen 文本编辑器 Windows 安装包。"
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: false

      - name: 上传安装包为构建产物
        uses: actions/upload-artifact@v4
        with:
          name: lumen-windows-installer
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
